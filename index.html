    <title>Meu Primeiro Site</title> <!-- Titula da pagina, aparece na aba do navegador -->
</head> <!-- Fecha a tag HEAD -->
<body> <!-- Corpo da pagina. Tudo que aparece para o usuario fica aqui! -->
    <h1>Bem vindo ao meu site!</h1>

    <p>Esta é uma estrutura HTML básica</p>

</html>
